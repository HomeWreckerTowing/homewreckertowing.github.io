<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Home Wrecker Towing Dashboard</title>
<style>
:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --surface-2: #ece8df;
  --text: #22211d;
  --muted: #6f6a61;
  --border: #d7d2c7;
  --primary: #0c6a6f;
  --primary-dark: #094e52;
  --success: #3c7a35;
  --warning: #bf7c18;
  --danger: #ab3434;
  --radius: 16px;
  --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }

.app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
.sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 24px; }

.logo { margin-bottom: 14px; text-align: center; }
.logo img { max-width: 100%; height: auto; max-height: 76px; object-fit: contain; }

.brand { font-size: 24px; font-weight: 700; color: var(--primary); margin-bottom: 8px; line-height: 1.2; }
.brand-meta { color: var(--muted); font-size: 13px; line-height: 1.45; margin-bottom: 20px; }
.nav a {
  display: block;
  text-decoration: none;
  color: var(--text);
  padding: 12px 14px;
  border-radius: 12px;
  margin-bottom: 8px;
}
.nav a:hover, .nav a.active { background: var(--surface-2); color: var(--primary-dark); }

.main { padding: 24px; }
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.topbar h1 { font-size: 28px; }
.topbar p { color: var(--muted); margin-top: 6px; }
.quick-actions { display: flex; gap: 10px; flex-wrap: wrap; }

button, .btn {
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 11px 16px;
  font-size: 14px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
button:hover, .btn:hover { background: var(--primary-dark); }
button.secondary, .btn.secondary { background: #e7f2f2; color: var(--primary-dark); }
button.secondary:hover, .btn.secondary:hover { background: #d8ecec; }
button.danger { background: var(--danger); }
button.ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }

.grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 16px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 18px;
}
.card h2, .card h3 { margin-bottom: 8px; }
.card p { color: var(--muted); line-height: 1.5; }
.stat-number { font-size: 28px; color: var(--primary-dark); font-weight: 700; }
.app-section { display: none; }
.app-section.active { display: block; }

.stack { display: flex; flex-direction: column; gap: 14px; }
.row { display: flex; gap: 10px; flex-wrap: wrap; }

label { display: block; margin-bottom: 6px; color: #3e3b35; font-size: 13px; font-weight: 600; }
input, select, textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 14px;
  background: #fff;
}
textarea { min-height: 90px; resize: vertical; }

.form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
.form-grid .full { grid-column: 1 / -1; }

.list { display: flex; flex-direction: column; gap: 10px; }
.list-item {
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  background: #fff;
  display: grid;
  gap: 10px;
  grid-template-columns: 1.3fr 1fr auto;
  align-items: center;
}
.meta { color: var(--muted); font-size: 13px; line-height: 1.5; }
.pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 6px 10px;
  font-size: 12px;
  font-weight: 700;
}
.pill.active { background: #e7f5ec; color: var(--success); }
.pill.pending { background: #fff2df; color: var(--warning); }
.pill.completed { background: #e5eef7; color: #2f5f9b; }

.form-cards { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
.form-card { cursor: pointer; }
.form-card h3 { font-size: 16px; margin-bottom: 6px; }
.form-card small { color: var(--muted); }

.muted { color: var(--muted); }
.hidden { display: none !important; }
.notice {
  position: fixed;
  right: 20px;
  bottom: 20px;
  background: #104447;
  color: #fff;
  padding: 10px 14px;
  border-radius: 10px;
  box-shadow: var(--shadow);
  z-index: 1000;
}

.printable-form {
  margin-top: 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  background: #fff;
}
.print-header h2 { margin-bottom: 4px; }
.print-grid { margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
.print-field { border-bottom: 1px solid #d8d8d8; padding: 6px 0; font-size: 13px; }
.print-field strong { display: block; color: #444; font-size: 12px; }

@media (max-width: 1100px) {
  .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .form-cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  .grid, .form-grid { grid-template-columns: 1fr; }
  .list-item { grid-template-columns: 1fr; }
  .form-cards { grid-template-columns: 1fr; }
}

@media print {
  body * { visibility: hidden !important; }
  body.print-form #form-print-view, body.print-form #form-print-view * { visibility: visible !important; }
  body.print-form #form-print-view {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    border: none;
    box-shadow: none;
    margin: 0;
  }
}
</style>
</head>
